<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵📖 詩歌聖經知識大挑戰</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#eeecea;--text:#1a1a1a;--text2:#6b6b6b;--bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.22);--ok-bg:#eaf3de;--ok:#3b6d11;--ok-bd:#639922;--ng-bg:#fcebeb;--ng:#a32d2d;--ng-bd:#e24b4a;--r:12px;--rs:8px;--wa:#856404;--wa-bg:#fff3cd;--bl:#0c5460;--bl-bg:#d1ecf1}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f5f5f5;--text2:#a0a0a0;--bd:rgba(255,255,255,0.12);--bd2:rgba(255,255,255,0.22);--ok-bg:#173404;--ok:#97c459;--ok-bd:#3b6d11;--ng-bg:#501313;--ng:#f09595;--ng-bd:#a32d2d;--wa:#f0c040;--wa-bg:#3a2e00;--bl:#80d4e8;--bl-bg:#003040}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:1.5rem 1rem}
.app{background:var(--bg);border-radius:18px;width:100%;max-width:540px;padding:1.75rem 1.5rem;box-shadow:0 2px 20px rgba(0,0,0,.1);align-self:flex-start}
.scr{display:none}.scr.on{display:block}
.btn{background:var(--text);color:var(--bg);border:none;border-radius:var(--rs);padding:.75rem 1.5rem;font-size:15px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;display:inline-block}
.btn:hover{opacity:.82}.btn.full{width:100%;display:block;text-align:center;margin-bottom:10px}
.btn.sec{background:var(--bg);color:var(--text);border:0.5px solid var(--bd2)}.btn.sec:hover{background:var(--bg2)}
.btn.big{font-size:17px;padding:1rem 2rem}
.btn.ghost{background:none;color:var(--text2);border:0.5px solid var(--bd);font-size:13px;padding:.5rem 1rem}
.btn.ghost:hover{background:var(--bg2);color:var(--text)}
.opt{display:block;width:100%;background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rs);padding:.875rem 1rem;cursor:pointer;text-align:left;font-size:15px;margin-bottom:8px;font-family:inherit;color:var(--text);transition:all .15s}
.opt:hover:not(:disabled){border-color:var(--bd2);background:var(--bg2)}
.opt.cor{background:var(--ok-bg)!important;border-color:var(--ok-bd)!important;color:var(--ok)!important;font-weight:600}
.opt.wrg{background:var(--ng-bg)!important;border-color:var(--ng-bd)!important;color:var(--ng)!important}
.sbar{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;background:var(--bg2);border-radius:var(--r);padding:.875rem 1rem;margin-bottom:1rem}
.sbar-t{font-size:13px;font-weight:500}.sbar-p{font-size:24px;font-weight:700;text-align:center}
.sep{font-size:11px;color:var(--text2);text-align:center}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.pbtn{border:0.5px solid var(--bd);border-radius:var(--r);padding:1.25rem .5rem;cursor:pointer;text-align:center;background:var(--bg);font-family:inherit;transition:all .15s;color:var(--text)}
.pbtn:hover,.pbtn.sel{border-color:var(--text);background:var(--text);color:var(--bg)}
.pnum{font-size:30px;font-weight:700;display:block}
.plbl{font-size:12px;display:block;margin-top:4px;opacity:.75}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.cbtn{border:0.5px solid var(--bd);border-radius:var(--rs);padding:.875rem .5rem;cursor:pointer;text-align:center;background:var(--bg);font-family:inherit;transition:all .15s;color:var(--text);font-size:14px}
.cbtn:hover{border-color:var(--text);background:var(--bg2)}
.cbtn.worship{border-color:var(--wa);background:var(--wa-bg);color:var(--wa)}
.cbtn.bible{border-color:var(--bl);background:var(--bl-bg);color:var(--bl)}
.ctx-box{background:var(--bg2);border-radius:var(--r);padding:1.5rem 1.5rem 1.25rem;margin-bottom:1.25rem}
.ctx-src{font-size:12px;color:var(--text2);margin-bottom:.875rem;display:flex;align-items:center;gap:6px}
.ctx-pre,.ctx-post{font-size:14px;color:var(--text2);line-height:1.7;font-style:italic}
.ctx-pre{margin-bottom:.5rem}
.ctx-post{margin-top:.5rem}
.ctx-main{font-size:20px;line-height:1.9;word-break:keep-all;padding:.25rem 0}
.blk{display:inline-block;border-bottom:2.5px solid var(--text);min-width:80px;margin:0 5px;vertical-align:middle}
.ans-filled{display:inline-block;border-bottom:2.5px solid var(--ok-bd);min-width:80px;margin:0 5px;vertical-align:middle;color:var(--ok);font-weight:700;padding:0 4px}
.fill-row{display:flex;gap:8px;margin-bottom:1rem}
.fill-row input{flex:1;font-size:16px;padding:.75rem 1rem;border:0.5px solid var(--bd2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:inherit;outline:none}
.fill-row input:focus{border-color:var(--text)}.fill-row input:disabled{opacity:.6}
.fb{padding:.875rem 1rem;border-radius:var(--rs);font-size:14px;line-height:1.6;margin-bottom:.875rem}
.fb.ok{background:var(--ok-bg);color:var(--ok);border:0.5px solid var(--ok-bd)}
.fb.ng{background:var(--ng-bg);color:var(--ng);border:0.5px solid var(--ng-bd)}
.yt-wrap{border-radius:var(--r);overflow:hidden;margin-bottom:1rem;background:#000;aspect-ratio:16/9}
.yt-wrap iframe{width:100%;height:100%;border:none;display:block}
.badge{font-size:13px;padding:3px 10px;border-radius:6px;font-weight:600;display:inline-block}
.badge.w{background:var(--wa-bg);color:var(--wa)}.badge.b{background:var(--bl-bg);color:var(--bl)}.badge.wu{background:#d4edda;color:#155724}
.verse-box{background:var(--bl-bg);border:0.5px solid var(--bd);border-radius:var(--rs);padding:.875rem 1rem;margin-top:.625rem;font-size:14px;line-height:1.7;color:var(--text)}
.verse-ref{font-size:12px;font-weight:600;color:var(--bl);margin-bottom:.25rem}
.cat-label{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
.pts-badge{font-size:13px;font-weight:700;background:var(--bg2);border-radius:6px;padding:3px 10px}
input[type=text]{width:100%;font-size:16px;padding:.75rem;border:0.5px solid var(--bd2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:inherit;outline:none;margin-bottom:1rem}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px}
.row{display:flex;gap:8px}.row .btn{flex:1;margin-bottom:0}
.divider{border:none;border-top:0.5px solid var(--bd);margin:1rem 0}
</style>
</head>
<body>
<div class="app">

<!-- HOME -->
<div id="s-home" class="scr">
  <div style="text-align:center;padding:2rem 0 1.5rem">
    <div style="font-size:44px;margin-bottom:.5rem">🎵📖</div>
    <h1 style="font-size:22px;font-weight:600;margin-bottom:.25rem">詩歌聖經知識大挑戰</h1>
    <p style="font-size:13px;color:var(--text2)">敬拜 ✦ 聖經 ✦ 搶分競賽</p>
  </div>
  <button class="btn big full" onclick="go('wu-intro')">🎤 暖場送分題（全體）</button>
  <button class="btn big full sec" onclick="go('setup')">⚔️ 開始競賽（兩隊對決）</button>
</div>

<!-- WARMUP INTRO -->
<div id="s-wu-intro" class="scr">
  <div style="text-align:center;padding:1.5rem 0">
    <div style="font-size:40px;margin-bottom:.5rem">🎤</div>
    <h2 style="font-size:18px;font-weight:500;margin-bottom:.5rem">暖場送分題</h2>
    <p style="font-size:14px;color:var(--text2);margin-bottom:1.5rem">上週造句搞笑範例回顧，全體搶答！共 3 題</p>
    <button class="btn big" onclick="startWU()">開始！</button>
  </div>
</div>

<!-- WARMUP Q -->
<div id="s-wu-q" class="scr">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
    <span id="wu-ctr" style="font-size:13px;color:var(--text2)"></span>
    <span class="badge wu">🎉 暖場送分</span>
  </div>
  <div class="ctx-box">
    <p class="ctx-src">上週造句搞笑範例</p>
    <p class="ctx-main" id="wu-q" style="font-size:17px;text-align:center"></p>
  </div>
  <div id="wu-opts"></div>
  <div id="wu-after" style="display:none">
    <div class="fb ok"><strong>✓ 正確答案：</strong><span id="wu-ans"></span></div>
    <button class="btn full" id="wu-nxt" onclick="nextWU()">下一題 →</button>
  </div>
</div>

<!-- WARMUP DONE -->
<div id="s-wu-done" class="scr">
  <div style="text-align:center;padding:2rem 0">
    <div style="font-size:44px;margin-bottom:.5rem">🎉</div>
    <h2 style="font-size:20px;font-weight:500;margin-bottom:.5rem">暖場結束！</h2>
    <p style="font-size:14px;color:var(--text2);margin-bottom:1.5rem">準備進入正式競賽！</p>
    <button class="btn big full" onclick="go('setup')">進入競賽 ⚔️</button>
    <button class="btn sec full" onclick="go('home')">回首頁</button>
  </div>
</div>

<!-- SETUP -->
<div id="s-setup" class="scr">
  <h2 style="font-size:18px;font-weight:500;margin-bottom:1.25rem">⚔️ 設定隊伍名稱</h2>
  <label>隊伍一</label><input type="text" id="t1n" value="紅隊">
  <label>隊伍二</label><input type="text" id="t2n" value="藍隊">
  <button class="btn big full" onclick="startGame()">開始競賽！</button>
</div>

<!-- TURN -->
<div id="s-turn" class="scr">
  <div class="sbar">
    <div><div class="sbar-t" id="tn0"></div><div class="sbar-p" id="sc0">0</div></div>
    <div class="sep">VS</div>
    <div style="text-align:right"><div class="sbar-t" id="tn1" style="text-align:right"></div><div class="sbar-p" id="sc1">0</div></div>
  </div>
  <div style="background:var(--bg2);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.25rem;text-align:center">
    <p style="font-size:13px;color:var(--text2);margin-bottom:3px">輪到</p>
    <p style="font-size:22px;font-weight:600" id="cur-t"></p>
  </div>

  <p style="font-size:13px;color:var(--text2);margin-bottom:.625rem">① 選擇分數與題型</p>
  <div class="pgrid" id="pts-grid">
    <button class="pbtn" id="pb1" onclick="selPts(1)"><span class="pnum">1</span><span class="plbl">分 · 選擇題</span></button>
    <button class="pbtn" id="pb3" onclick="selPts(3)"><span class="pnum">3</span><span class="plbl">分 · 填空題</span></button>
    <button class="pbtn" id="pb5" onclick="selPts(5)"><span class="pnum">5</span><span class="plbl">分 · 清唱題</span></button>
  </div>

  <div id="cat-section" style="display:none">
    <p style="font-size:13px;color:var(--text2);margin-bottom:.625rem">② 選擇考題類型</p>
    <div class="cgrid">
      <button class="cbtn worship" onclick="selCat('w')"><div style="font-size:18px">🎵</div>詩歌</button>
      <button class="cbtn bible" id="bible-btn" onclick="selCat('b')"><div style="font-size:18px">📖</div>聖經</button>
      <button class="cbtn" id="rand-btn" onclick="selCat('r')"><div style="font-size:18px">🎲</div>隨機</button>
    </div>
  </div>

  <hr class="divider">
  <div class="row">
    <button class="btn sec" onclick="swap()">↔ 換隊</button>
    <button class="btn sec" onclick="endGame()">結束競賽</button>
  </div>
</div>

<!-- QUESTION -->
<div id="s-question" class="scr">
  <div class="sbar">
    <div><div class="sbar-t" id="qtn0"></div><div class="sbar-p" id="qsc0">0</div></div>
    <div class="sep">VS</div>
    <div style="text-align:right"><div class="sbar-t" id="qtn1" style="text-align:right"></div><div class="sbar-p" id="qsc1">0</div></div>
  </div>

  <div class="cat-label">
    <span id="q-cat" class="badge"></span>
    <span id="q-pts-lbl" class="pts-badge"></span>
    <span id="q-team-lbl" style="font-size:13px;color:var(--text2);margin-left:auto"></span>
  </div>

  <div class="ctx-box">
    <div class="ctx-src"><span id="q-src"></span></div>
    <p class="ctx-pre" id="q-pre"></p>
    <p class="ctx-main" id="q-txt"></p>
    <p class="ctx-post" id="q-post"></p>
  </div>

  <!-- YouTube hint (worship only) -->
  <div id="yt-hint-section" style="display:none;margin-bottom:1rem">
    <button class="btn ghost full" id="yt-toggle-btn" onclick="toggleYT()" style="margin-bottom:.5rem">🎧 聽音樂提示（副歌）</button>
    <div class="yt-wrap" id="yt-wrap" style="display:none">
      <iframe id="yt-iframe" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>

  <div id="q-opts"></div>
  <div id="q-action"></div>
</div>

<!-- FINAL -->
<div id="s-final" class="scr">
  <div style="text-align:center;padding:1.5rem 0 1rem">
    <div style="font-size:44px;margin-bottom:.5rem">🏆</div>
    <h2 style="font-size:20px;font-weight:600;margin-bottom:1.25rem">競賽結束！</h2>
  </div>
  <div id="final-body" style="margin-bottom:1.5rem"></div>
  <button class="btn big full" onclick="restart()">再玩一次</button>
  <button class="btn sec full" onclick="go('home')">回首頁</button>
</div>

</div>

let wuI=0, teams=['紅隊','藍隊'], sc=[0,0], curT=0, curPts=0, curQ=null;

// ── HELPERS ──
function go(id){document.querySelectorAll('.scr').forEach(x=>x.classList.remove('on'));document.getElementById('s-'+id).classList.add('on');}
function shuf(a){return[...a].sort(()=>Math.random()-.5);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function norm(s){return String(s).trim().replace(/[\s，。！？、；：「」『』【】《》〈〉…—～·,.!?;:'"''\-]/g,'');}

function updSbar(){
  ['tn0','tn1','qtn0','qtn1'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=teams[i%2];});
  ['sc0','sc1','qsc0','qsc1'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=sc[i%2];});
  const ct=document.getElementById('cur-t');if(ct)ct.textContent=teams[curT];
}

function drawFrom(pool, used){
  let avail=pool.filter(i=>!used.includes(i));
  if(!avail.length){used.length=0;avail=[...pool];}
  const idx=avail[Math.floor(Math.random()*avail.length)];
  used.push(idx);return idx;
}

// ── WARMUP ──
function startWU(){wuI=0;go('wu-q');showWU();}
function showWU(){
  const q=WU[wuI];
  document.getElementById('wu-ctr').textContent=`第 ${wuI+1} 題 ／ 共 ${WU.length} 題`;
  document.getElementById('wu-after').style.display='none';
  document.getElementById('wu-opts').innerHTML='';

  if(q.type==='acapella'){
    // 清唱題：顯示歌詞段落（有空格）
    const lines=q.q.split('\n');
    document.getElementById('wu-q').innerHTML=lines.map(l=>
      `<span style="display:block;line-height:1.9">${l.replace(/___/g,'<span style="display:inline-block;border-bottom:2px solid var(--text);min-width:40px;margin:0 3px">＿＿</span>')}</span>`
    ).join('');
    document.getElementById('wu-opts').innerHTML=`
      <div class="hint-box" style="margin-bottom:.875rem"><span style="font-size:18px;flex-shrink:0">🎤</span><span>清唱題！填入空格，並清唱這段歌詞</span></div>
      <div class="fill-row"><input type="text" id="wu-fill" placeholder="空格答案…" autocomplete="off"/><button class="btn" onclick="checkWUFill()">確認</button></div>
      <div id="wu-fill-fb"></div>`;
    setTimeout(()=>{const i=document.getElementById('wu-fill');if(i){i.focus();i.onkeydown=e=>{if(e.key==='Enter')checkWUFill();};}},80);
    document.getElementById('wu-ans').textContent=q.full;
  } else if(q.type==='fill'){
    // 填空題：顯示題目 + 句型提示 + 輸入框
    document.getElementById('wu-q').textContent=q.q;
    const hintHtml=q.hint?q.hint.replace(/___/g,'<span style="display:inline-block;border-bottom:2px solid var(--text);min-width:50px;margin:0 3px;vertical-align:middle"></span>'):'';
    document.getElementById('wu-opts').innerHTML=`
      ${hintHtml?`<p style="font-size:18px;margin-bottom:.875rem;line-height:2">${hintHtml}</p>`:''}
      <div class="fill-row"><input type="text" id="wu-fill" placeholder="輸入答案…" autocomplete="off"/><button class="btn" onclick="checkWUFill()">確認</button></div>
      <div id="wu-fill-fb"></div>`;
    setTimeout(()=>{const i=document.getElementById('wu-fill');if(i){i.focus();i.onkeydown=e=>{if(e.key==='Enter')checkWUFill();};}},80);
    document.getElementById('wu-ans').textContent=q.a;
  } else {
    // 選擇題
    document.getElementById('wu-q').textContent=q.q;
    document.getElementById('wu-opts').innerHTML=shuf(q.o).map(o=>`<button class="opt" data-o="${esc(o)}" onclick="pickWU(this)">${esc(o)}</button>`).join('');
    document.getElementById('wu-ans').textContent=q.a;
  }
  document.getElementById('wu-nxt').textContent=wuI<WU.length-1?'下一題 →':'完成暖場 🎉';
}

function checkWUFill(){
  const q=WU[wuI];
  const inp=document.getElementById('wu-fill');if(!inp)return;
  const val=norm(inp.value);if(!val)return;
  inp.disabled=true;
  const sb=document.querySelector('.fill-row .btn');if(sb)sb.disabled=true;
  const ok=val===norm(q.a);
  const fb=document.getElementById('wu-fill-fb');
  const isSing=q.type==='acapella';
  if(ok){
    fb.innerHTML=`<div class="fb ok" style="margin-top:.5rem">✓ 答對了！太棒了！${isSing?'<br><small>🎤 請清唱：<strong>'+esc(q.full)+'</strong></small>':''}</div>`;
  } else {
    fb.innerHTML=`<div class="fb ng" style="margin-top:.5rem">✗ 答錯了。正確答案：<strong>${esc(q.a)}</strong>${isSing?'<br><small>🎤 完整歌詞：'+esc(q.full)+'</small>':''}</div>`;
  }
  document.getElementById('wu-after').style.display='block';
}

function pickWU(btn){
  document.querySelectorAll('#wu-opts .opt').forEach(b=>b.disabled=true);
  const ok=norm(btn.dataset.o)===norm(WU[wuI].a);
  btn.classList.add(ok?'cor':'wrg');
  if(!ok)document.querySelectorAll('#wu-opts .opt').forEach(b=>{if(norm(b.dataset.o)===norm(WU[wuI].a))b.classList.add('cor');});
  document.getElementById('wu-after').style.display='block';
}
function nextWU(){wuI++;if(wuI>=WU.length)go('wu-done');else showWU();}

// ── GAME ──
function startGame(){
  teams[0]=document.getElementById('t1n').value.trim()||'紅隊';
  teams[1]=document.getElementById('t2n').value.trim()||'藍隊';
  sc=[0,0];curT=0;usedW=[];usedB=[];usedAll=[];usedCh=[];
  go('turn');updSbar();resetTurnUI();
}
function restart(){sc=[0,0];curT=0;usedW=[];usedB=[];usedAll=[];usedCh=[];go('turn');updSbar();resetTurnUI();}
function swap(){curT=1-curT;updSbar();}

function resetTurnUI(){
  selPtsVal=null;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('cat-section').style.display='none';
}

function selPts(p){
  selPtsVal=p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('pb'+p).classList.add('sel');
  // 清唱題只能選詩歌，直接跳過類型選擇
  if(p===5){
    document.getElementById('cat-section').style.display='none';
    selCat('w');
  } else {
    document.getElementById('bible-btn').style.display='';
    document.getElementById('rand-btn').style.display='';
    document.getElementById('cat-section').style.display='block';
  }
}

function selCat(cat){
  curPts=selPtsVal;
  let pool, used;
  if(cat==='w'){
    if(curPts===5){pool=QS.map((q,i)=>i).filter(i=>QS[i].c==='w'&&QS[i].ch);used=usedCh;}
    else{pool=QS.map((q,i)=>i).filter(i=>QS[i].c==='w');used=usedW;}
  } else if(cat==='b'){
    pool=QS.map((q,i)=>i).filter(i=>QS[i].c==='b');used=usedB;
  } else {
    if(curPts===5){pool=QS.map((q,i)=>i).filter(i=>QS[i].c==='w'&&QS[i].ch);used=usedCh;}
    else{pool=QS.map((q,i)=>i);used=usedAll;}
  }
  const idx=drawFrom(pool,used);
  curQ=QS[idx];
  showQ();
}

// ── QUESTION SCREEN ──
function showQ(){
  closeYT();
  updSbar();

  // Category badge
  const catEl=document.getElementById('q-cat');
  const isW=curQ.c==='w';
  catEl.textContent=isW?'🎵 詩歌題':'📖 聖經題';
  catEl.className='badge '+(isW?'w':'b');
  document.getElementById('q-pts-lbl').textContent=curPts+' 分';
  document.getElementById('q-team-lbl').textContent=`${teams[curT]} 作答`;

  // Source
  document.getElementById('q-src').textContent=curQ.s;

  // Context lines
  const preEl=document.getElementById('q-pre');
  const postEl=document.getElementById('q-post');
  preEl.textContent=curQ.pre||'';
  preEl.style.display=curQ.pre?'block':'none';
  postEl.textContent=curQ.post||'';
  postEl.style.display=curQ.post?'block':'none';

  // Question with blank
  document.getElementById('q-txt').innerHTML=fmtBlank(curQ.q,curQ.a);

  // YouTube hint button
  const ytSec=document.getElementById('yt-hint-section');
  ytSec.style.display=(isW&&curQ.yt)?'block':'none';
  document.getElementById('yt-toggle-btn').textContent='🎧 聽音樂提示（副歌）';

  // Answer area
  document.getElementById('q-opts').innerHTML='';
  document.getElementById('q-action').innerHTML='';

  if(curPts===1){
    document.getElementById('q-opts').innerHTML=shuf(curQ.o).map(o=>`<button class="opt" data-o="${esc(o)}" onclick="pickOpt(this)">${esc(o)}</button>`).join('');
    document.getElementById('q-action').innerHTML='<div id="fill-fb"></div>';
  } else {
    const hint=curPts===5?'輸入空格的答案，並清唱這句副歌：':'輸入空格的答案：';
    document.getElementById('q-action').innerHTML=`
      <p style="font-size:13px;color:var(--text2);margin-bottom:6px">${hint}</p>
      <div class="fill-row">
        <input type="text" id="fill-in" placeholder="輸入答案…" autocomplete="off"/>
        <button class="btn" onclick="checkFill()">確認</button>
      </div>
      <div id="fill-fb"></div>`;
    setTimeout(()=>{const i=document.getElementById('fill-in');if(i){i.focus();i.onkeydown=e=>{if(e.key==='Enter')checkFill();};}},80);
  }
  go('question');
}

function fmtBlank(q,ans){const h='＿'.repeat(ans?ans.length:4);return q.replace(/___/g,'<span class="blk" style="min-width:unset;letter-spacing:2px">'+h+'</span>');}
function fmtFilled(q,ans){return q.replace(/___/g,`<span class="ans-filled">${esc(ans)}</span>`);}

// ── YOUTUBE ──
function toggleYT(){
  const wrap=document.getElementById('yt-wrap');
  const btn=document.getElementById('yt-toggle-btn');
  if(!ytOpen){
    document.getElementById('yt-iframe').src=`https://www.youtube.com/embed/${curQ.yt}?rel=0&autoplay=1`;
    wrap.style.display='block';
    btn.textContent='✕ 關閉音樂';
    ytOpen=true;
  } else {closeYT();}
}
function closeYT(){
  const wrap=document.getElementById('yt-wrap');
  const iframe=document.getElementById('yt-iframe');
  if(wrap){wrap.style.display='none';}
  if(iframe){iframe.src='';}
  ytOpen=false;
  const btn=document.getElementById('yt-toggle-btn');
  if(btn)btn.textContent='🎧 聽音樂提示（副歌）';
}

// ── ANSWERING ──
function pickOpt(btn){
  document.querySelectorAll('#q-opts .opt').forEach(b=>b.disabled=true);
  const ok=norm(btn.dataset.o)===norm(curQ.a);
  btn.classList.add(ok?'cor':'wrg');
  if(!ok)document.querySelectorAll('#q-opts .opt').forEach(b=>{if(norm(b.dataset.o)===norm(curQ.a))b.classList.add('cor');});
  if(ok)sc[curT]+=curPts;
  updSbar();
  document.getElementById('q-txt').innerHTML=fmtFilled(curQ.q,curQ.a);
  // Show verse for bible questions
  if(curQ.c==='b'&&curQ.verse){
    const fb=document.getElementById('fill-fb')||document.getElementById('q-action');
    const vEl=document.createElement('div');
    vEl.innerHTML=verseHtml();
    document.getElementById('q-action').insertBefore(vEl,document.getElementById('q-action').firstChild);
  }
  appendNextBtn(ok);
}

function checkFill(){
  const inp=document.getElementById('fill-in');if(!inp)return;
  const val=norm(inp.value);if(!val)return;
  inp.disabled=true;
  document.querySelector('.fill-row .btn').disabled=true;
  const ok=val===norm(curQ.a);
  if(ok)sc[curT]+=curPts;
  updSbar();
  const fb=document.getElementById('fill-fb');
  const fullLine=curQ.fl||curQ.q.replace(/___/,curQ.a);
  const isB=curQ.c==='b';
  const isSing=curPts===5;
  if(ok){
    fb.innerHTML=`<div class="fb ok">✓ 答對了！太棒了！${isSing?'<br><small>🎤 請清唱：<strong>'+esc(fullLine)+'</strong></small>':''}</div>${isB?verseHtml():''}`;
  } else {
    fb.innerHTML=`<div class="fb ng">✗ 答錯了。正確答案：<strong>${esc(curQ.a)}</strong>${isSing?'<br><small>🎤 完整歌詞：'+esc(fullLine)+'</small>':''}</div>${isB?verseHtml():''}`;
  }
  document.getElementById('q-txt').innerHTML=fmtFilled(curQ.q,curQ.a);
  appendNextBtn(ok);
}

function appendNextBtn(ok){
  const action=document.getElementById('q-action');
  const b=document.createElement('button');
  b.className='btn full';b.style.marginTop='.5rem';
  b.innerHTML=ok?`✓ 得 ${curPts} 分！→ 換隊`:`✗ 沒得分 → 換隊`;
  b.onclick=()=>{closeYT();curT=1-curT;go('turn');updSbar();resetTurnUI();};
  action.appendChild(b);
}

// ── FINAL ──
function endGame(){
  const w=sc[0]>sc[1]?teams[0]:sc[1]>sc[0]?teams[1]:null;
  document.getElementById('final-body').innerHTML=`
    <div style="display:flex;gap:12px;margin-bottom:1rem">
      <div style="flex:1;background:var(--bg2);border-radius:var(--r);padding:1.25rem;text-align:center">
        <div style="font-size:14px;font-weight:500;margin-bottom:.25rem">${esc(teams[0])}</div>
        <div style="font-size:42px;font-weight:700">${sc[0]}</div><div style="font-size:12px;color:var(--text2)">分</div>
      </div>
      <div style="flex:1;background:var(--bg2);border-radius:var(--r);padding:1.25rem;text-align:center">
        <div style="font-size:14px;font-weight:500;margin-bottom:.25rem">${esc(teams[1])}</div>
        <div style="font-size:42px;font-weight:700">${sc[1]}</div><div style="font-size:12px;color:var(--text2)">分</div>
      </div>
    </div>
    <div style="text-align:center;padding:1.25rem;background:var(--bg2);border-radius:var(--r)">
      ${w?`<div style="font-size:24px;margin-bottom:.25rem">🏆</div><div style="font-size:18px;font-weight:600">${esc(w)} 獲勝！</div>`:'<div style="font-size:20px;font-weight:600">平局！🎊</div>'}
    </div>`;
  go('final');
}

go('home');
</script>
</body>
</html>
